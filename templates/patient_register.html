{% extends 'base.html' %}
{% block title %}Patient Register - Tabibak{% endblock %}

{% block extra_head %}
<style>
    body {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        min-height: 100vh;
    }
    .auth-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 70px);
        padding: 40px 20px;
        margin-top: 70px;
    }
    .auth-card {
        background: white;
        border-radius: 24px;
        padding: 40px 40px;
        width: 100%;
        max-width: 550px;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }
    .auth-logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 5px; text-align: center; }
    .auth-subtitle { color: var(--text-muted); margin-bottom: 30px; font-size: 15px; text-align: center; }
    
    .input-group { margin-bottom: 16px; text-align: left; }
    .input-group label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--dark); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
    .input-group input, .input-group select {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 15px;
        font-family: inherit;
        outline: none;
        transition: var(--transition);
        background: #f8fafc;
    }
    .input-group input:focus, .input-group select:focus { border-color: var(--primary); background: white; }
    
    .row { display: flex; gap: 15px; }
    .row .input-group { flex: 1; }
    
    .auth-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
        margin-top: 10px;
        margin-bottom: 20px;
    }
    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(14,165,233,0.3); }
    
    .error {
        background: #fee2e2;
        color: #dc2626;
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 20px;
        font-size: 14px;
        font-weight: 600;
        text-align: center;
    }
    
    .auth-links { font-size: 14px; color: var(--text-muted); text-align: center; }
    .auth-links a { color: var(--primary); text-decoration: none; font-weight: 700; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">Tabibak <em>طبيبك</em></div>
        <div class="auth-subtitle">Create your patient account</div>

        {% if error %}
        <div class="error">❌ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/patient/register">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Your full name" required>
            </div>
            <div class="row">
                <div class="input-group">
                    <label>Age</label>
                    <input type="number" name="age" placeholder="Your age" required>
                </div>
                <div class="input-group">
                    <label>Blood Type</label>
                    <select name="blood_type">
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                        <option>O+</option>
                        <option>O-</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="text" name="phone" placeholder="01xxxxxxxxx" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn">Create Account →</button>
        </form>

        <div class="auth-links">
            Already have an account? <a href="/patient/login" data-t="login">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
