{% extends 'base.html' %}
{% block title %}Patient Login - Tabibak{% endblock %}

{% block extra_head %}
<style>
    body {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        min-height: 100vh;
    }
    .auth-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 70px);
        padding: 40px 20px;
        margin-top: 70px;
    }
    .auth-card {
        background: white;
        border-radius: 24px;
        padding: 50px 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        text-align: center;
        position: relative;
    }
    .auth-logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
    .auth-subtitle { color: var(--text-muted); margin-bottom: 30px; font-size: 15px; }
    
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--dark); font-size: 14px; }
    .input-group input {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 15px;
        font-family: inherit;
        outline: none;
        transition: var(--transition);
        background: #f8fafc;
    }
    .input-group input:focus { border-color: var(--primary); background: white; }
    
    .auth-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
        margin-bottom: 20px;
    }
    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(14,165,233,0.3); }
    
    .error {
        background: #fee2e2;
        color: #dc2626;
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 20px;
        font-size: 14px;
        font-weight: 600;
    }
    
    .auth-links { font-size: 14px; color: var(--text-muted); }
    .auth-links a { color: var(--primary); text-decoration: none; font-weight: 700; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">Tabibak <em>طبيبك</em></div>
        <div class="auth-subtitle" data-t="patient_desc">Patient Portal — Sign in to your account</div>

        {% if error %}
        <div class="error">❌ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/patient/login">
            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn">Login →</button>
        </form>

        <div class="auth-links">
            Don't have an account? <a href="/patient/register" data-t="create_account">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
